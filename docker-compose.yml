services:
  shop:
    container_name: temp-shop
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "1453:3000"
    restart: unless-stopped

